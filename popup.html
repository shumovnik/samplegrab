<!--POPUP.html-->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">~</span> SAMPLE<span>GRAB</span>
            </div>
            <div class="header-icons">
                <span class="settings-icon">⚙️</span>
            </div>
        </header>

        <div class="main-grid">
            <div class="master-panel">
                <div class="clip-indicator" id="peakLed">CLIP</div>
                
                <div class="meter-section">
                    <!-- Levi kanal -->
                    <div class="meter-container">
                        <div id="levelBarL" class="level-bar"></div>
                    </div>

                    <!-- Skala u sredini -->
                    <div class="meter-labels">
                        <span>+6</span>
                        <span>0</span>
                        <span>-6</span>
                        <span>-12</span>
                        <span>-18</span>
                        <span>-24</span>
                        <span>-36</span>
                        <span>-48</span>
                    </div>

                    <!-- Desni kanal -->
                    <div class="meter-container">
                        <div id="levelBarR" class="level-bar"></div>
                    </div>
                </div>
                <div class="peak-numbers">
                    <span class="peak-left" id="peakVal">-33.0</span>
                </div>
            </div>

            <div class="center-panel">
                <div class="rec-button-wrapper">
                    <div id="recBtn" class="rec-circle">
                        <div class="rings"></div>
                        <div id="recDot" class="rec-dot"></div>
                    </div>
                </div>
                <div id="displayTimer" class="timer">00:00:00</div>
            </div>

            <div class="side-panel right">
                <div class="group">
                    <div class="group-label">FORMAT</div>
                    <div class="format-list">
                        <div class="active" data-tooltip="Compressed audio, smaller file size. Great for sharing and quick sampling.">MP3 <span>→</span></div>
                        <div data-tooltip="Uncompressed audio, maximum quality. Best for DAW work and professional use.">WAV</div>
                    </div>
                </div>

                <div class="group">
                    <div class="group-label">SAMPLE RATE</div>
                    <div class="samplerate-list">
                        <div class="active" data-tooltip="Standard quality...">44100 <span>→</span></div>
                        <div data-tooltip="Pro quality...">48000</div>
                    </div>
                </div>
                <div class="group">
                    <div class="group-label">CHANNELS</div>
                    <div class="channels-list">
                        <div class="active" data-tooltip="Two channel audio. Preserves left/right stereo field.">Stereo <span>→</span></div>
                        <div data-tooltip="Single channel audio. Sums left and right. Smaller file size.">Mono</div>
                    </div>
                </div>
                <div class="group">
                    <div class="group-label">IN GAIN</div>
                    <div class="knob-container">
                        <div class="knob" id="gainKnob">
                            <div class="knob-pointer"></div>
                        </div>
                        <input type="range" id="inputGain" min="0" max="1" step="0.01" value="0.5" style="display:none;">
                        <span id="gainVal">-6 dB</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="waveform-container">
            <button id="waveformClose" style="display:none;">✕</button>
            <canvas id="recordingCanvas"></canvas>
            <div id="playbackControls" style="display:none;">
                <div class="playback-bar">
                <button id="playBtn" class="playback-btn">▶</button>
                <div class="playback-duration" id="playbackDuration">0:00</div>
                <button id="normalizeBtn" class="playback-btn normalize" data-tooltip="Normalize: boost audio so the loudest point hits 0dB. Click again to revert to original.">▲ NR</button>
                <button id="downloadBtn" class="playback-btn download">↓ WAV</button>
            </div>
            </div>
            <div class="capture-modes">
                <div class="retro-row">
                    <span class="retro-label">RETRO REC <span class="retro-info-icon" data-tooltip="Retrospective recording continuously buffers the last N seconds of audio in the background. Hit CAPTURE anytime to save what you just heard — even if you forgot to press record. Learn more at samplegrab.io/retro">?</span></span>
                    <label class="switch">
                        <input type="checkbox" id="retroToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="retro-options" id="retroOptions">
                    <div class="retro-duration">
                        <span class="retro-dur-btn active" data-seconds="30" data-tooltip="Buffer the last 30 seconds of audio.">30s</span>
                        <span class="retro-dur-btn" data-seconds="60" data-tooltip="Buffer the last 60 seconds of audio.">60s</span>
                    </div>
                    <button class="retro-capture-btn" id="retroCaptureBtn" data-tooltip="Save the last N seconds to your library instantly.">● CAPTURE</button>
                </div>
            </div>
        </div>

        <div class="drag-drop-zone">
            <div class="drop-icon">⬡</div>
            <div class="drop-text">
                DRAG & DROP TO DAW
                <span>HOLD 1S & DRAG</span>
            </div>
        </div>

        <div class="list-title">Library</div>
        <div id="recordingsList"></div>
    </div>
    <div id="sgTooltip" class="sg-tooltip"></div>
    <div id="sgAlert" class="sg-alert" style="display:none;">
    <div class="sg-alert-box">
        <div class="sg-alert-msg" id="sgAlertMsg"></div>
        <button class="sg-alert-btn" id="sgAlertBtn">OK</button>
    </div>
</div>
    <script src="popup.js" type="module"></script>
</body>
</html>
